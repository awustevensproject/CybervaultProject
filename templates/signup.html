{% extends "base.html" %}
{% block title %}Create Account — CyberVault{% endblock %}

{% block card %}
<div class="card-header">
  <h1>Create account</h1>
  <p>Sign up with email, username, and password.</p>
</div>

{% if error %}
<div class="flash-error">{{ error }}</div>
{% endif %}

<form method="POST" action="{{ url_for('signup') }}">
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required
           value="{{ email or '' }}" />
  </div>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="johndoe" autocomplete="username" required
           pattern="[a-zA-Z0-9_]{3,20}" title="3–20 characters: letters, numbers, underscore"
           value="{{ username or '' }}" />
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="password-wrap">
      <input type="password" id="password" name="password" placeholder="At least 10 chars, upper, lower, number" autocomplete="new-password" required minlength="10" maxlength="128" />
      <button type="button" class="toggle-pw" data-target="password" aria-label="Show password">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button type="submit" class="btn-primary">Create Account</button>
</form>

<div class="card-footer">
  Already have an account? <a class="link" href="{{ url_for('login') }}">Sign in</a>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });
</script>
{% endblock %}
