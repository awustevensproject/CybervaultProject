<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cybervault{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface-elevated: #2c2c2e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --border: rgba(255, 255, 255, 0.1);
      --input-border: rgba(255, 255, 255, 0.14);
      --placeholder: #636366;
      --error: #ff3b30;
      --focus-ring: rgba(0, 113, 227, 0.35);
      --mesh-1: rgba(0, 113, 227, 0.22);
      --mesh-2: rgba(0, 113, 227, 0.12);
      --radius: 10px;
      --radius-pill: 980px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      min-height: 100%;
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% 15%, var(--mesh-1), transparent),
        radial-gradient(ellipse 55% 45% at 90% 90%, var(--mesh-2), transparent),
        radial-gradient(ellipse 50% 40% at 10% 85%, rgba(0, 113, 227, 0.06), transparent),
        var(--bg);
      background-attachment: fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .page-ui {
      width: 100%;
      max-width: 320px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.32s ease;
    }

    .page-ui.is-visible {
      opacity: 1;
    }

    body.page-exit .page-ui {
      opacity: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .page-ui {
        opacity: 1;
        transition: none;
      }
    }

    .app-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
      color: inherit;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #0071e3 0%, #005bb5 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 113, 227, 0.35);
    }

    .logo-mark svg { width: 18px; height: 18px; fill: white; }

    .logo-text {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .card-panel {
      width: 100%;
      text-align: center;
    }

    .card-header { margin-bottom: 24px; }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.45;
    }

    .field {
      margin-bottom: 16px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--surface-elevated);
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--placeholder); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .flash-error {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.25);
      border-radius: var(--radius);
      padding: 9px 11px;
      margin-bottom: 14px;
      font-size: 0.75rem;
      color: var(--error);
      text-align: center;
    }

    .flash-success {
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.25);
      border-radius: var(--radius);
      padding: 9px 11px;
      margin-bottom: 14px;
      font-size: 0.75rem;
      color: #34c759;
      text-align: center;
    }

    .password-wrap { position: relative; }
    .password-wrap input {
      padding-right: 40px;
      user-select: text;
      -webkit-user-select: text;
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: var(--text); }

    .btn-primary,
    a.btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 42px;
      margin-top: 4px;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 500;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary:disabled:hover { background: var(--accent); }

    .btn-secondary,
    button.btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 42px;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .card-footer {
      margin-top: 20px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .link:hover { opacity: 0.75; }

    .vault-list {
      width: 100%;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .vault-item {
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--surface-elevated);
      border: 1px solid var(--input-border);
    }

    .vault-item strong {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 4px;
    }

    .vault-item span {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.8125rem;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="page">
    <div class="page-ui" id="page-ui">
      {% block logo %}
      <a href="{{ url_for('home') }}" class="app-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18l6.9 3.83L12 11.84 5.1 8.01 12 4.18zM5 9.27l6 3.33v7.07l-6-3.33V9.27zm14 0v7.07l-6 3.33v-7.07l6-3.33z"/>
          </svg>
        </div>
        <span class="logo-text">CyberVault</span>
      </a>
      {% endblock %}

      <div class="card-panel">
        {% block card %}{% endblock %}
      </div>
    </div>
  </div>

  <script>
    (function () {
      var pageUi = document.getElementById('page-ui');
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function showPage() {
        document.body.classList.remove('page-exit');
        if (pageUi && !reduced) {
          requestAnimationFrame(function () {
            pageUi.classList.add('is-visible');
          });
        } else if (pageUi) {
          pageUi.classList.add('is-visible');
        }
      }

      function fadeOutAndGo(fn) {
        if (reduced) {
          fn();
          return;
        }
        document.body.classList.add('page-exit');
        setTimeout(fn, 320);
      }

      showPage();
      window.addEventListener('pageshow', function (e) {
        document.body.classList.remove('page-exit');
        if (!e.persisted || !pageUi || reduced) return;
        pageUi.classList.remove('is-visible');
        requestAnimationFrame(function () {
          pageUi.classList.add('is-visible');
        });
      });

      document.querySelectorAll('a[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || href.charAt(0) === '#') return;
        if (link.target === '_blank' || link.hasAttribute('download')) return;
        link.addEventListener('click', function (e) {
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
          var url;
          try { url = new URL(href, window.location.href); } catch (_) { return; }
          if (url.origin !== window.location.origin) return;
          e.preventDefault();
          fadeOutAndGo(function () { window.location.href = url.href; });
        });
      });

      document.querySelectorAll('form').forEach(function (form) {
        form.addEventListener('submit', function (e) {
          setTimeout(function () {
            if (e.defaultPrevented) return;
            if (!reduced) document.body.classList.add('page-exit');
          }, 0);
        });
      });

      document.querySelectorAll('.toggle-pw').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var input = document.getElementById(btn.dataset.target);
          if (!input) return;
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });

      var loginForm = document.getElementById('login-form');
      if (loginForm) {
        var loginSubmit = document.getElementById('login-submit');
        var loginUsername = document.getElementById('username');
        var loginPassword = document.getElementById('password');
        function updateLoginSubmit() {
          loginSubmit.disabled = !(loginUsername.value.trim() && loginPassword.value);
        }
        loginUsername.addEventListener('input', updateLoginSubmit);
        loginPassword.addEventListener('input', updateLoginSubmit);
        updateLoginSubmit();
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
