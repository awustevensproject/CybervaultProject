{% extends "base.html" %}
{% block title %}Dashboard — Cybervault{% endblock %}

{% block card %}
<div class="card-header">
  <h1>Welcome, {{ username }}</h1>
  <p>You are signed in{% if role == 'admin' %} as an administrator{% endif %}.</p>
</div>

<div class="btn-stack">
  {% if role == 'admin' %}
  <a href="{{ url_for('admin') }}" class="btn-primary">Admin Panel</a>
  {% endif %}
  <form method="POST" action="{{ url_for('logout') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <button type="submit" class="btn-secondary">Sign Out</button>
  </form>
</div>
{% endblock %}
